<div class="row py-5">
  <div class="col-lg-12">
    <h2>Contact</h2>

  </div>

<div class="row pb-5">
  <div class="col-lg-6">
    <form>
      <div class="mb-3 row">
        <label for="email" class="col-sm-2 col-form-label">Your E-mail</label>
        <div class="col-sm-10">
          <input type="email" class="form-control" id="email" placeholder="Your email">
        </div>
      </div>
      <div class="mb-3 row">
        <label for="message" class="col-sm-2 col-form-label">Your message</label>
        <div class="col-sm-10">
          <textarea class="form-control" id="message" rows="4" placeholder="Please enter your message here..."></textarea>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-10 offset-sm-2">
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>
      </div>
    </form>
  </div>
</div>
